<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Computer XO Online</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>
<body>

<!-- LOGIN PAGE -->

<div id="loginPage" class="page">

    <div class="card login-card">

        <h1>🎮 Computer XO Online</h1>

        <input
            type="text"
            id="playerName"
            placeholder="กรอกชื่อผู้เล่น"
        >

        <h3>เลือกโหมด</h3>

        <select id="modeSelect">

            <option value="2">
                2 Players
            </option>

            <option value="3">
                3 Players
            </option>

        </select>

        <button id="createRoomBtn">
            ➕ สร้างห้อง
        </button>

        <hr>

        <input
            type="text"
            id="joinRoomCode"
            placeholder="รหัสห้อง"
        >

        <button id="joinRoomBtn">
            🚪 เข้าห้อง
        </button>

    </div>

</div>

<!-- WAITING ROOM -->

<div
id="waitingPage"
class="page"
style="display:none;"
>

    <div class="card">

        <h1>🏠 Waiting Room</h1>

        <h2>
            Room :
            <span id="roomCodeText"></span>
        </h2>

        <h3>
            Mode :
            <span id="roomModeText"></span>
        </h3>

        <div id="playerList">

        </div>

        <p id="waitingStatus">

        </p>

        <button id="copyRoomBtn">
            📋 Copy Room Code
        </button>

        <button id="backToLoginBtn">
            ⬅️ กลับ
        </button>

    </div>

</div>

<!-- GAME PAGE -->

<div
id="gamePage"
class="page"
style="display:none;"
>

<div class="container">

<h1>
🏆 Computer XO Online
</h1>

<h2>
Room :
<span id="gameRoomCode"></span>
</h2>

<div class="top-panel">

<div class="card">

<h3>
Current Turn
</h3>

<div id="currentPlayer">

</div>

</div>

</div>

<div class="board" id="board">

<div class="cell" data-index="0"></div>
<div class="cell" data-index="1"></div>
<div class="cell" data-index="2"></div>

<div class="cell" data-index="3"></div>
<div class="cell" data-index="4"></div>
<div class="cell" data-index="5"></div>

<div class="cell" data-index="6"></div>
<div class="cell" data-index="7"></div>
<div class="cell" data-index="8"></div>

</div>

<div
class="status"
id="status"
>
กำลังเล่น...
</div>

<div class="card score-card">

<h2>
🏆 Score Board
</h2>

<table>

<tr>

<th>
Player
</th>

<th>
Win
</th>

<th>
Lose
</th>

</tr>

<tbody id="scoreTable">

</tbody>

</table>

</div>

<br>

<button id="newGameBtn">
🔄 New Game
</button>

<button id="resetBtn">
🗑️ Reset Score
</button>

<button id="backRoomBtn">
⬅️ กลับไปห้อง
</button>

<button id="logoutBtn">
🚪 Logout
</button>

</div>

</div>

</body>
</html>
